apiVersion: v1
kind: Service
metadata:
  name: {{ include "omc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.full" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: app
    protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: app
  selector:
    {{- include "labels.match" . | nindent 4 }}
